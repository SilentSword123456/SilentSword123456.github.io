<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SilentLab</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Animated background grid -->
<div class="background-grid"></div>

<!-- Terminal Navigation -->
<nav class="terminal-nav">
    <div class="terminal-prompt">
        <span class="prompt-text">silent@lab:~$</span>
        <div id="nav-commands">
            <!-- Navigation commands will be dynamically loaded -->
        </div>
    </div>
</nav>

<div class="main-content">
    <img src="logo_nobg.png" alt="SilentLab Logo" class="main-logo">
    <div class="main-text">
        <h1>Welcome to SilentLab</h1>
        <p class="typing-text" data-text="15-year-old programmer ready to code the future..."></p>
    </div>
</div>

<!-- Interactive Content Sections -->
<div class="content-sections" id="content-sections">
    <!-- Sections will be dynamically loaded -->
</div>

<div class="particle-trail">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<script src="script.js"></script>
</body>
</html>
